
services:
  blue:
    build: ./app/v1.0
    container_name: blue
    environment:
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - ENVIRONMENT_NAME=${ENVIRONMENT_NAME:-blue}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "8081:8080" # Exposed for direct access if needed
    networks:
      - bg-network

  green:
    build: ./app/v2.0
    container_name: green
    environment:
      - APP_VERSION=${APP_VERSION_GREEN:-2.0.0}
      - ENVIRONMENT_NAME=${ENVIRONMENT_NAME_GREEN:-green}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_HOST=db
      - FEATURE_PHONE_NUMBER_ENABLED=${FEATURE_PHONE_NUMBER_ENABLED:-true}
      - FEATURE_PROFILE_PICTURE_ENABLED=${FEATURE_PROFILE_PICTURE_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "8082:8080" # Exposed for direct access if needed
    networks:
      - bg-network

  db:
    image: postgres:15
    container_name: db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-appdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bg-network

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - blue
    networks:
      - bg-network

volumes:
  db_data:

networks:
  bg-network:
